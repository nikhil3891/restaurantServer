services:

  # ─── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'           # host:container — your app connects on localhost:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_db
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists even after container stops

  # ─── Redis (for caching + BullMQ queues — needed in later modules) ─
  redis:
    image: redis:7-alpine
    container_name: restaurant_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

# ─── Named volumes (Docker manages these) ─────────────────────────────
volumes:
  postgres_data:
  redis_data:
